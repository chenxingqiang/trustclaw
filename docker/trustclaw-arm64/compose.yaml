# TrustClaw ARM64 offline compose (医保内网 / 选手电脑自测).
# 在 docker/trustclaw-arm64 目录执行: docker compose up -d
services:
  app:
    image: trustclaw-app:arm64
    pull_policy: never
    env_file:
      - app.env
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_DISABLE_BONJOUR: "1"
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${APP_PORT:-8080}:19001"
      - "${TRUSTCLAW_UI_PORT:-5174}:19001"
    volumes:
      - trustclaw-data:/home/node/.openclaw
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:19001/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - NET_ADMIN

volumes:
  trustclaw-data:
