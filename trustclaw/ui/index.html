<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TrustClaw TRA Runtime Console — live audit and trust-runtime operations" />
    <title>TrustClaw — TRA Runtime Console</title>
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="data:," />
    <script>
      (function () {
        var THEMES = { claw: 1, knot: 1, dash: 1, custom: 1 };
        var MODES = { system: 1, light: 1, dark: 1 };
        var LEGACY = {
          dark: "claw:dark",
          light: "claw:light",
          openknot: "knot:dark",
          fieldmanual: "dash:dark",
          clawdash: "dash:light",
          system: "claw:system",
        };
        try {
          var keys = Object.keys(localStorage);
          var raw;
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf("openclaw.control.settings.v1") === 0) {
              raw = localStorage.getItem(keys[i]);
              if (raw) break;
            }
          }
          if (!raw) return;
          var s = JSON.parse(raw);
          var t = s && s.theme;
          var m = s && s.themeMode;
          if (typeof t !== "string") t = "";
          if (typeof m !== "string") m = "";
          var legacy = LEGACY[t];
          var theme = THEMES[t] ? t : legacy ? legacy.split(":")[0] : "claw";
          var mode = MODES[m] ? m : legacy ? legacy.split(":")[1] : "system";
          if (mode === "system") {
            mode = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          var resolved =
            theme === "knot"
              ? mode === "light"
                ? "openknot-light"
                : "openknot"
              : theme === "dash"
                ? mode === "light"
                  ? "dash-light"
                  : "dash"
                : theme === "custom"
                  ? mode === "light"
                    ? "custom-light"
                    : "custom"
                  : mode === "light"
                    ? "light"
                    : "dark";
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.setAttribute("data-theme-mode", mode);
          document.documentElement.style.colorScheme = mode;
          if (mode === "light") {
            document.documentElement.classList.add("theme-light", "theme-claw-light");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
